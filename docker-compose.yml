services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: privacy_umbrella_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-privacy_umbrella}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/dump_clean.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    networks:
      - privacy_umbrella_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # InfluxDB is hosted remotely — no local container needed.
  # Services connect to ${INFLUX_URL} defined in .env.

  mosquitto:
    image: eclipse-mosquitto:2.0-openssl
    container_name: pu_mqtt_broker
    restart: unless-stopped
    ports:
      - "${MQTT_BROKER_PORT:-1883}:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - privacy_umbrella_network
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck | grep -v Error || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: privacy_umbrella_redis
    restart: unless-stopped
    networks:
      - privacy_umbrella_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Microservices ─────────────────────────────────────────────────────────

  patient_registry:
    build:
      context: ./patient_registry_service
      dockerfile: Dockerfile
    container_name: privacy_umbrella_patient_registry
    restart: unless-stopped
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     5432
      POSTGRES_DB:       ${POSTGRES_DB:-privacy_umbrella}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MQTT_BROKER_HOST:  mosquitto
      MQTT_BROKER_PORT:  1883
      PORT:              7001
    networks:
      - privacy_umbrella_network
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  federated_learning:
    build:
      context: ./federated_learning_server
      dockerfile: Dockerfile
    container_name: privacy_umbrella_fl
    restart: unless-stopped
    environment:
      FL_SERVER_HOST: localhost
      FL_SERVER_PORT: 50051
      PORT:           7002
    volumes:
      - fl_models:/app/grpc/models
      - fl_logs:/app/logs
    networks:
      - privacy_umbrella_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  record_linkage:
    build:
      context: ./record_linkage_service
      dockerfile: Dockerfile
    container_name: privacy_umbrella_record_linkage
    restart: unless-stopped
    environment:
      POSTGRES_HOST:      postgres
      POSTGRES_PORT:      5432
      POSTGRES_DB:        ${POSTGRES_DB:-privacy_umbrella}
      POSTGRES_USER:      ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD}
      INFLUX_URL:         ${INFLUX_URL:-https://pu-influxdb.smarko-health.de}
      INFLUX_TOKEN:       ${INFLUX_TOKEN}
      INFLUX_ORG:         ${INFLUX_ORG:-mcs-data-labs}
      INFLUX_BUCKET_RAW:  ${INFLUX_BUCKET_RAW:-raw-data}
      INFLUX_BUCKET_ANON: ${INFLUX_BUCKET_ANON:-anonymized-data}
      PORT:               7003
    networks:
      - privacy_umbrella_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  central_anon:
    build:
      context: ./central_anonymization_api
      dockerfile: Dockerfile
    container_name: privacy_umbrella_central_anon
    restart: unless-stopped
    environment:
      DEFAULT_K_VALUE:      10
      PORT:                 6000
      # Override if you place the CSV elsewhere on the host
      HIERARCHY_CSV_PATH:   /app/data/smarko_hierarchy_ecg.csv
    volumes:
      # Provide smarko_hierarchy_ecg.csv on the host at this path, or adjust
      # the source path to wherever you have the file.
      - ./central_anonymization_api/data/smarko_hierarchy_ecg.csv:/app/data/smarko_hierarchy_ecg.csv:ro
    networks:
      - privacy_umbrella_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: privacy_umbrella_dashboard
    restart: unless-stopped
    environment:
      SECRET_KEY:             ${SECRET_KEY:?Please set SECRET_KEY in .env}
      ADMIN_USERNAME:         ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:         ${ADMIN_PASSWORD:-admin123}
      PATIENT_REGISTRY_URL:   http://patient_registry:7001
      FEDERATED_LEARNING_URL: http://federated_learning:7002
      RECORD_LINKAGE_URL:     http://record_linkage:7003
      CENTRAL_ANON_URL:       http://central_anon:6000
      REDIS_URL:              redis://redis:6379/0
      PORT:                   5000
    volumes:
      - dashboard_logs:/app/logs
    networks:
      - privacy_umbrella_network
    depends_on:
      redis:
        condition: service_healthy
      patient_registry:
        condition: service_healthy
      federated_learning:
        condition: service_healthy
      record_linkage:
        condition: service_healthy
      central_anon:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: privacy_umbrella_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - privacy_umbrella_network
    depends_on:
      dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_logs:
  fl_models:
  fl_logs:
  dashboard_logs:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  privacy_umbrella_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
