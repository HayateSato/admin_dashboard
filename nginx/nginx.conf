events {
    worker_connections 1024;
}

http {
    # Hide Nginx version from error pages and headers
    server_tokens off;

    # Increase buffer sizes for larger request bodies (file uploads, etc.)
    client_max_body_size 50M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # HTTP server — proxies all traffic to the Flask admin dashboard
    server {
        listen 80;
        server_name _;  # Accept any hostname; replace with your domain when known

        # Pass real client IP through to Flask
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://admin_dashboard:5000;

            # WebSocket support (for MQTT WebSocket UI, if needed)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTPS server (uncomment when SSL certificates are available)
    # -----------------------------------------------------------
    # server {
    #     listen 443 ssl;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto https;
    #
    #     location / {
    #         proxy_pass http://admin_dashboard:5000;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade    $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #     }
    # }
    #
    # Redirect HTTP → HTTPS (enable together with the HTTPS block above)
    # server {
    #     listen 80;
    #     server_name your.domain.com;
    #     return 301 https://$host$request_uri;
    # }
}
